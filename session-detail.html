<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Details - AttendSys</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand fade-in-up">
                <div class="brand-wrapper">
                    <div class="brand-logo"><i class="fa-solid fa-book-open-reader"></i></div>
                    <div class="brand-text"><h2>ICCT Cainta</h2><p>Room B2-A9</p></div>
                </div>
                <button class="sidebar-toggle-btn" id="closeSidebarBtn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item fade-in-up delay-1"><i class="fa-solid fa-border-all"></i><span>Dashboard</span></a>
                <a href="student.html" class="nav-item fade-in-up delay-2"><i class="fa-solid fa-users"></i><span>Student</span></a>
                <a href="session.html" class="nav-item active fade-in-up delay-3"><i class="fa-solid fa-calendar-days"></i><span>Session</span></a>
                <a href="analytics.html" class="nav-item fade-in-up delay-4"><i class="fa-solid fa-chart-pie"></i><span>Analytics</span></a>
            </nav>
            <a href="#" class="nav-item logout-btn fade-in-up delay-4"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log out</span></a>
        </aside>

        <main class="main-content">
            <header class="page-header fade-in-up" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div style="display: flex; gap: 20px; align-items: center; flex: 1;">
                    <button class="mobile-menu-btn" id="openSidebarBtn"><i class="fa-solid fa-bars"></i></button>
                    <button onclick="window.history.back()" style="background: white; color: var(--text-dark); border: 1px solid #e2e8f0; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; transition: var(--transition); box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-arrow-left"></i></button>
                    <div>
                        <h1 id="detailSessionTitle" style="font-size: 1.5rem; letter-spacing: -0.02em; margin-bottom: 2px;">Loading Session...</h1>
                        <div class="sub-header-info">
                            <span><i class="fa-regular fa-calendar"></i> <span id="detailSessionDate">-</span></span>
                            <span><i class="fa-regular fa-clock"></i> <span id="detailSessionTime">-</span></span>
                            <span><i class="fa-solid fa-location-dot"></i> <span id="detailSessionLoc">-</span></span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="stat-card card-hover fade-in-up delay-1">
                    <div class="stat-header"><span class="stat-title">Total Students</span><div class="stat-icon" style="background: var(--color-primary-light); color: var(--color-primary);"><i class="fa-solid fa-users"></i></div></div>
                    <h2 id="detailTotal">0</h2>
                </div>
                <div class="stat-card card-hover fade-in-up delay-2">
                    <div class="stat-header"><span class="stat-title">Present Today</span><div class="stat-icon" style="background: var(--color-green-light); color: var(--color-green);"><i class="fa-solid fa-user-check"></i></div></div>
                    <h2 id="detailPresent" style="color: var(--color-green)">0</h2>
                </div>
                <div class="stat-card card-hover fade-in-up delay-3">
                    <div class="stat-header"><span class="stat-title">Absent Today</span><div class="stat-icon" style="background: var(--color-red-light); color: var(--color-red);"><i class="fa-solid fa-user-xmark"></i></div></div>
                    <h2 id="detailAbsent" style="color: var(--color-red)">0</h2>
                </div>
            </div>

            <div class="table-container fade-in-up delay-4">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; flex-wrap: wrap; gap: 15px;">
                    <div class="search-bar" style="margin-bottom: 0; flex: 1; max-width: 400px;">
                        <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8;"></i>
                        <input type="text" placeholder="Search by name, ID or RFID...">
                    </div>
                    
                    <button id="exportSessionCsvBtn" class="btn-primary" style="background: white; border: 1px solid #e2e8f0; color: var(--text-dark); box-shadow: var(--shadow-sm); padding: 10px 16px; font-size: 0.85rem;">
                        <i class="fa-solid fa-file-excel" style="color: var(--color-green);"></i> Export Excel
                    </button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Course & Year</th>
                            <th>Status</th>
                            <th>Scanned Time</th>
                        </tr>
                    </thead>
                    <tbody id="sessionDetailTableBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Session - AttendSys</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand fade-in-up">
                <div class="brand-wrapper">
                    <div class="brand-logo"><i class="fa-solid fa-book-open-reader"></i></div>
                    <div class="brand-text"><h2>ICCT Cainta</h2><p>Room B2-A9</p></div>
                </div>
                <button class="sidebar-toggle-btn" id="closeSidebarBtn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item fade-in-up delay-1"><i class="fa-solid fa-border-all"></i><span>Dashboard</span></a>
                <a href="student.html" class="nav-item fade-in-up delay-2"><i class="fa-solid fa-users"></i><span>Student</span></a>
                <a href="session.html" class="nav-item active fade-in-up delay-3"><i class="fa-solid fa-calendar-days"></i><span>Session</span></a>
                <a href="analytics.html" class="nav-item fade-in-up delay-4"><i class="fa-solid fa-chart-pie"></i><span>Analytics</span></a>
            </nav>
            <a href="#" class="nav-item logout-btn fade-in-up delay-4"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log out</span></a>
        </aside>

        <main class="main-content">
            <header class="page-header fade-in-up">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <button class="mobile-menu-btn" id="openSidebarBtn"><i class="fa-solid fa-bars"></i></button>
                    <div>
                        <h1>Class Sessions</h1>
                        <p>Manage scheduled classes. The system automatically locks when time expires.</p>
                    </div>
                </div>
                <button class="btn-primary" onclick="openSessionModal()"><i class="fa-solid fa-plus"></i> New Session</button>
            </header>

            <div class="table-container fade-in-up delay-1">
                <table>
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Set</th>
                            <th>Schedule</th>
                            <th>Location</th>
                            <th>Attendance</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sessionTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="createSessionModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Create New Session</h3>
                <button class="modal-close" onclick="closeSessionModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-group"><label>Subject Code</label><input type="text" id="newSubject" placeholder="e.g. CC310" autocomplete="off"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Set / Group</label>
                    <select id="newSet"><option value="A">Set A</option><option value="B">Set B</option></select>
                </div>
                <div class="form-group"><label>Room Location</label><input type="text" id="newRoom" placeholder="e.g. B2-A9" autocomplete="off"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Start Time</label><input type="time" id="newTimeStart" required></div>
                <div class="form-group"><label>End Time</label><input type="time" id="newTimeEnd" required></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSessionModal()">Cancel</button>
                <button class="btn-primary" onclick="createNewSession()">Create Session</button>
            </div>
        </div>
    </div>

    <div id="editSessionModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Edit Session</h3>
                <button class="modal-close" onclick="closeEditSessionModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="editSessionIdDb">
            <div class="form-group"><label>Subject Code</label><input type="text" id="editSubject" autocomplete="off"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Set / Group</label>
                    <select id="editSet"><option value="A">Set A</option><option value="B">Set B</option></select>
                </div>
                <div class="form-group"><label>Room Location</label><input type="text" id="editRoom" autocomplete="off"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Start Time</label><input type="time" id="editTimeStart" required></div>
                <div class="form-group"><label>End Time</label><input type="time" id="editTimeEnd" required></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditSessionModal()">Cancel</button>
                <button class="btn-primary" onclick="updateSession()">Update Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
